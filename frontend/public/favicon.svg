<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0e2e"/>
  <!-- Camera body -->
  <rect x="10" y="20" width="44" height="30" rx="5" fill="#1a2260"/>
  <!-- Viewfinder bump -->
  <rect x="22" y="14" width="14" height="8" rx="3" fill="#1a2260"/>
  <!-- Lens outer ring -->
  <circle cx="32" cy="35" r="11" fill="#0a0e2e" stroke="#4d79ff" stroke-width="2"/>
  <!-- Lens inner -->
  <circle cx="32" cy="35" r="7" fill="#0d1235"/>
  <!-- Lens highlight -->
  <circle cx="32" cy="35" r="4" fill="#4d79ff" opacity="0.35"/>
  <circle cx="29" cy="32" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- Flash dot -->
  <circle cx="16" cy="26" r="2.5" fill="#f5c842"/>
</svg>
